<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC 2026 - Animated Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a2a;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* Тот же самый canvas, что и на сайте */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        /* Опционально: текст поверх фона для демонстрации */
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        h1 {
            font-size: 3rem;
            margin-top: 20vh;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

        // После того как код загружен, создается canvas через:

        // Автоматический запуск при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            // Создаем canvas
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '-1';
            document.body.insertBefore(canvas, document.body.firstChild);
            
            // Запускаем фон с типом "onboarding" или "voting"
            if (typeof GM === 'function') {
                GM(canvas, 'voting', {
                    motion: true,
                    primaryColor: getComputedStyle(document.documentElement)
                        .getPropertyValue('--color-bg-anim-one') || '#0a0a42',
                    secondaryColor: getComputedStyle(document.documentElement)
                        .getPropertyValue('--color-bg-anim-two') || '#0a0a42'

            }
